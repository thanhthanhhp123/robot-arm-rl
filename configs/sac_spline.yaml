# SAC — target chạy theo spline khép kín (Catmull-Rom) qua các điểm tự vẽ.
seed: 42
algo: sac

env:
  l1: 1.0
  l2: 1.0
  max_steps: 200
  max_angular_step: 0.1
  dt: 0.05
  target_bounds: [0.5, 1.9]
  trajectory: spline
  trajectory_params:
    points:                     # control points trong workspace (|p| <= l1+l2)
      - [1.3, 0.2]
      - [0.8, 0.9]
      - [0.0, 1.2]
      - [-0.6, 0.6]
      - [0.3, 0.1]
    period: 10.0

sac:
  policy: MlpPolicy
  learning_rate: 3.0e-4
  buffer_size: 100000
  learning_starts: 1000
  batch_size: 256
  tau: 0.005
  gamma: 0.99
  train_freq: 1
  gradient_steps: 1
  ent_coef: auto
  device: cpu

train:
  total_timesteps: 100000
  checkpoint_freq: 10000
  distance_log_freq: 1000
  run_name: sac_spline
  output_root: outputs/runs

eval:
  n_episodes: 20
  success_threshold: 0.05
