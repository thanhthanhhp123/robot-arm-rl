# PPO — Slice 5: cùng task circle như sac_circle.yaml để so sánh SAC vs PPO.
seed: 42
algo: ppo

env:
  l1: 1.0
  l2: 1.0
  max_steps: 200
  max_angular_step: 0.1
  dt: 0.05
  target_bounds: [0.5, 1.9]
  trajectory: circle
  trajectory_params:
    center: [1.0, 0.0]
    radius: 0.5
    period: 10.0

ppo:
  policy: MlpPolicy
  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.0
  device: cpu

train:
  total_timesteps: 100000       # cùng budget với SAC để so sánh công bằng
  checkpoint_freq: 10000
  distance_log_freq: 1000
  run_name: ppo_circle
  output_root: outputs/runs

eval:
  n_episodes: 20
  success_threshold: 0.05
